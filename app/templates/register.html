{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-eyebrow" style="color:var(--inc);"><div class="auth-line" style="background:var(--inc);"></div>Free · 14-Day Trial</div>
    <div class="auth-title">Create your<br><i>account.</i></div>
    <div class="auth-sub">India's smartest personal finance tracker.</div>
    <form method="POST">
      <div class="fg">
        <label class="fl2">Full Name</label>
        <input type="text" name="name" required placeholder="Aditya Mishra" class="fi2">
      </div>
      <div class="fg">
        <label class="fl2">Email Address</label>
        <input type="email" name="email" required placeholder="your@email.com" class="fi2">
      </div>
      <div class="fg" style="margin-bottom:26px;">
        <label class="fl2">Password</label>
        <input type="password" name="password" required placeholder="Choose a strong password" class="fi2">
      </div>
      <button type="submit" class="btn-p" style="width:100%;text-align:center;padding:13px;">
        Create Account — Free →
      </button>
    </form>
    <div class="auth-divider"></div>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('main.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
